# Server configuration
server.port=8090

# Bank simulator configuration
bank.uri=http://bank_simulator:8080/payments

# Kafka configuration
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.producer.bootstrap-servers=kafka:29092

# Logging
logging.level.com.checkout.payment.gateway=DEBUG
logging.level.org.springframework.web=DEBUG

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Log pattern with traceId and spanId
logging.pattern.console=%d{HH:mm:ss} [%thread] [traceId=%X{traceId} spanId=%X{spanId}] %-5level %logger{36} - %msg%n