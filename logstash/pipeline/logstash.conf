input {
  kafka {
    bootstrap_servers => "kafka:29092"
    topics => ["api-monitoring"]
    codec => json
    client_id => "logstash"
    group_id => "logstash-group"
    auto_offset_reset => "earliest"
  }
}

filter {
  if [requestParams][paymentRequest] {
    # Extract payment metrics
    mutate {
      add_field => { "payment_amount" => "%{[requestParams][paymentRequest][amount]}" }
      add_field => { "payment_currency" => "%{[requestParams][paymentRequest][currency]}" }
      add_field => { "payment_status" => "%{status}" }
      add_field => { "api_duration" => "%{duration}" }
    }
  }
  
  # Parse timestamp
  date {
    match => [ "timestamp", "ISO8601" ]
  }
  
  # Remove sensitive fields
  mutate {
    remove_field => [ "requestParams", "host", "@version" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "payment-metrics-%{+YYYY.MM.dd}"
  }
}